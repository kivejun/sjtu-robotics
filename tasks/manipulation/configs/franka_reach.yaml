task:
  name: manipulation/franka_reach
  family: manipulation
  backend: isaaclab_official
  isaac_task_name: Isaac-Reach-Franka-v0
  official_task_hint: isaaclab_tasks.manager_based.manipulation.reach.config.franka.joint_pos_env_cfg

external:
  isaaclab_path: external/IsaacLab
  isaacsim_path: ~/isaacsim
  isaacsim_symlink: external/IsaacLab/_isaac_sim
  install_mode: isaac_sim_binary
  ubuntu_20_04_note: Use Isaac Sim binary installation because Isaac Sim pip packages require newer GLIBC than Ubuntu 20.04 provides.

robot:
  type: franka
  control_mode: joint_position

target:
  randomization: true
  position_range: null

training:
  algorithm: ppo
  seed: 42
  max_iterations: 32000
  num_envs: 128
  headless: true

evaluation:
  num_envs: 16
  video_length: 600

recording:
  num_envs: 1
  video_length: 1200
  rendering_mode: performance

outputs:
  log_dir: logs/manipulation/franka_reach
  checkpoint_dir: checkpoints/manipulation/franka_reach
  video_dir: outputs/videos/manipulation/franka_reach
  metrics_path: outputs/metrics/manipulation_franka_reach.json
