task:
  name: locomotion/humanoid
  family: locomotion
  backend: robot_lab

external:
  robot_lab_path: external/robot_lab
  isaaclab_path: external/IsaacLab

runtime:
  conda_env: sjtu-summer-camp

robot:
  category: humanoid
  model: Unitree G1

robot_lab:
  task_name: RobotLab-Isaac-Velocity-Rough-Unitree-G1-v0
  experiment_name: unitree_g1_rough

terrain:
  type: rough
  curriculum: true

training:
  algorithm: ppo
  seed: 42
  num_envs: 256
  max_iterations: 3000
  headless: true

evaluation:
  num_envs: 4
  headless: false

recording:
  num_envs: 1
  headless: true
  video_length: 1200

outputs:
  log_dir: logs/locomotion/humanoid
  checkpoint_dir: checkpoints/locomotion/humanoid
  video_dir: outputs/videos/locomotion/humanoid
  metrics_path: outputs/metrics/locomotion_humanoid.json
