task:
  name: locomotion/quadruped
  family: locomotion
  backend: robot_lab

external:
  robot_lab_path: external/robot_lab
  isaaclab_path: external/IsaacLab

runtime:
  conda_env: sjtu-summer-camp

robot:
  category: quadruped
  model: Unitree Go2

robot_lab:
  task_name: RobotLab-Isaac-Velocity-Rough-Unitree-Go2-v0
  experiment_name: unitree_go2_rough

terrain:
  type: rough
  curriculum: true

training:
  algorithm: ppo
  seed: 42
  num_envs: 1024
  max_iterations: 2000
  headless: true

evaluation:
  num_envs: 8
  headless: false

recording:
  num_envs: 1
  headless: true
  video_length: 1200

outputs:
  log_dir: logs/locomotion/quadruped
  checkpoint_dir: checkpoints/locomotion/quadruped
  video_dir: outputs/videos/locomotion/quadruped
  metrics_path: outputs/metrics/locomotion_quadruped.json
