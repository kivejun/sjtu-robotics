task:
  name: navigation/dynamic_obstacles
  family: navigation
  backend: sea_nav_modified_or_isaaclab

external_repo:
  path: external/SEA-Nav-Code
  note: >
    E2E dynamic avoidance stage 4D. Current code does not implement a true
    adversarial obstacle policy; this is a mild adversarial approximation using
    near-path focused obstacle sampling, random phases, and larger path-block
    windows.

runtime:
  conda_env: sea_nav

environment:
  scene: dynamic_obstacles_e2e_stage4d_curriculum_mild_adversarial
  goal_randomization: true
  enable_dynamic_obstacles: true
  num_dynamic_obstacles: 3
  obstacle_motion_modes:
    - pedestrian_like
    - back_and_forth
    - random_rigid_body
  obstacle_radius: 0.35
  obstacle_speed: 0.45
  obstacle_collision_distance: 0.62
  obstacle_amplitude_scale: 0.68
  obstacle_amplitude_min: 0.40
  obstacle_amplitude_max: 1.60
  phase_randomization: true
  focus_near_robot: true
  focus_distance_min: 0.95
  focus_distance_max: 1.65
  focus_lateral_min: 0.18
  focus_lateral_max: 0.85
  focus_phase_min: 0.25
  focus_phase_max: 0.90
  include_dynamic_obstacle_state: true
  dynamic_obstacle_state_k: 3
  ttc_horizon: 3.2
  ttc_safe_distance: 0.62
  path_block_distance: 3.4
  path_block_width: 1.15
  path_block_ttc: 3.2
  path_block_rise: 0.25
  path_block_fall: 0.05
  path_block_threshold: 0.38
  preferred_speed: 0.50
  wait_speed: 0.08
  blocked_timeout: 2.0

replay:
  enable_collision_replay: true
  replay_prob: 0.80
  early_reset_prob_range: [0.15, 0.70]
  undo_steps_range: [90, 160]
  max_collision_points: 24

reward:
  progress: 5.4
  preferred_velocity: 2.2
  dynamic_ttc: -6.4
  dynamic_clearance: -3.2
  wait: 1.2
  blocked_fast_penalty: -2.2
  detour: -0.40
  near_goal_stop: 2.0
  dynamic_collision: -160.0
  static_collision: -140.0
  successful_avoidance: 2.8
  risk_reduction: 1.6
  free_space_action: 0.5
  unsafe_ttc: -1.3
  nav_action_smoothness: -0.26
  progress_blocked_scale: 0.08
  progress_near_goal_scale: 0.16
  preferred_sigma: 0.45
  ttc_min_closing_speed: 0.03
  clearance_safe_distance: 1.35
  clearance_front_margin: -0.15
  wait_max_speed: 0.12
  wait_heading_weight: 1.0
  wait_timeout_decay: 0.22
  blocked_fast_speed_threshold: 0.18
  blocked_fast_ttc_threshold: 2.0
  blocked_fast_closing_speed_threshold: 0.05
  detour_lateral_weight: 1.0
  detour_yaw_weight: 0.5
  detour_blocked_scale: 0.04
  detour_timeout_scale: 0.22
  near_goal_distance: 0.60
  near_goal_speed: 0.03
  near_goal_max_speed: 0.10
  near_goal_max_yaw_rate: 0.35
  avoid_high_risk_distance: 1.05
  avoid_low_risk_distance: 1.35
  avoid_high_risk_ttc: 1.30
  avoid_low_risk_ttc: 2.50
  avoid_min_static_clearance: 0.45
  risk_reduction_distance_weight: 0.55
  risk_reduction_ttc_weight: 0.45
  free_space_safe_distance: 0.65
  free_space_speed_threshold: 0.08
  unsafe_ttc_threshold: 1.00
  nav_action_smoothness_sigma: 0.50

training:
  task_name: go2_dynamic_obstacles
  experiment_name: Go2_e2e_dynamic_avoidance
  algorithm: ppo
  seed: 42
  max_iterations: 4000
  num_envs: 768
  headless: true
  reset_optimizer: false

evaluation:
  experiment_name: Go2_e2e_dynamic_avoidance
  num_envs: 1
  headless: false
  total_episodes: 20

recording:
  experiment_name: Go2_e2e_dynamic_avoidance
  num_envs: 1
  headless: true
  video_length: 3000
  total_episodes: 5

outputs:
  log_dir: logs/navigation/dynamic_obstacles_e2e_stage4d_curriculum_mild_adversarial
  checkpoint_dir: checkpoints/navigation/dynamic_obstacles_e2e_stage4d_curriculum_mild_adversarial
  video_dir: outputs/videos/navigation/dynamic_obstacles_e2e_stage4d_curriculum_mild_adversarial
  metrics_path: outputs/metrics/navigation_dynamic_obstacles_e2e_stage4d_curriculum_mild_adversarial.json

