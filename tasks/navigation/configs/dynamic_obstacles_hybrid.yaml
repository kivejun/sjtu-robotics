task:
  name: navigation/dynamic_obstacles
  family: navigation
  backend: sea_nav_modified_or_isaaclab

external_repo:
  path: external/SEA-Nav-Code
  note: N1 hybrid route. SEA-Nav policy keeps static navigation ability; TTC/VO safety filter handles dynamic obstacles.

runtime:
  conda_env: sea_nav

environment:
  scene: dynamic_obstacles_hybrid
  goal_randomization: true
  enable_dynamic_obstacles: true
  num_dynamic_obstacles: 3
  obstacle_motion_modes:
    - pedestrian_like
    - back_and_forth
    - random_rigid_body
  obstacle_radius: 0.35
  obstacle_speed: 0.45
  obstacle_collision_distance: 0.60
  obstacle_amplitude_scale: 0.55
  obstacle_amplitude_min: 0.35
  obstacle_amplitude_max: 1.35
  include_dynamic_obstacle_state: false
  dynamic_obstacle_state_k: 3
  ttc_horizon: 3.0
  path_block_distance: 3.0
  path_block_width: 0.95
  path_block_ttc: 3.0
  path_block_rise: 0.25
  path_block_fall: 0.05
  path_block_threshold: 0.40
  preferred_speed: 0.50
  wait_speed: 0.00
  ttc_safe_distance: 0.60
  blocked_timeout: 3.0

pipeline:
  controller: hybrid_safety_filter
  hybrid_safe_distance: 0.78
  hybrid_critical_distance: 0.52
  hybrid_ttc_horizon: 3.0
  hybrid_stop_ttc: 1.05
  hybrid_slow_ttc: 2.2
  hybrid_front_ray_clearance: 0.48
  hybrid_max_lateral_speed: 0.45
  hybrid_escape_yaw_rate: 0.65
  hybrid_policy_weight: 3.0
  hybrid_progress_weight: 1.4
  hybrid_ttc_weight: 7.0
  hybrid_clearance_weight: 4.5
  hybrid_static_weight: 2.0
  hybrid_wait_bonus: 2.0
  hybrid_smoothness_weight: 0.5

training:
  task_name: go2_dynamic_obstacles
  experiment_name: Go2_pos_rough
  algorithm: sea_nav_policy_plus_ttc_vo_safety_filter
  seed: 42
  max_iterations: 0
  num_envs: 1
  headless: true

evaluation:
  experiment_name: Go2_pos_rough
  num_envs: 1
  headless: false
  total_episodes: 999999

recording:
  experiment_name: Go2_pos_rough
  num_envs: 1
  headless: true
  video_length: 3000
  total_episodes: 3

outputs:
  log_dir: logs/navigation/dynamic_obstacles_hybrid
  checkpoint_dir: checkpoints/navigation/dynamic_obstacles_hybrid
  video_dir: outputs/videos/navigation/dynamic_obstacles_hybrid
  metrics_path: outputs/metrics/navigation_dynamic_obstacles_hybrid.json
