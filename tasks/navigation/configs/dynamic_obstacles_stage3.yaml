task:
  name: navigation/dynamic_obstacles
  family: navigation
  backend: sea_nav_modified_or_isaaclab

external_repo:
  path: external/SEA-Nav-Code
  note: SEA-Nav dynamic obstacle curriculum stage 3, final N1 difficulty.

runtime:
  conda_env: sea_nav

environment:
  scene: dynamic_obstacles_stage3
  goal_randomization: true
  num_dynamic_obstacles: 3
  obstacle_motion_modes:
    - pedestrian_like
    - back_and_forth
    - random_rigid_body
  obstacle_radius: 0.35
  obstacle_speed: 0.45
  obstacle_collision_distance: 0.55
  obstacle_amplitude_scale: 0.55
  obstacle_amplitude_min: 0.35
  obstacle_amplitude_max: 1.35
  include_dynamic_obstacle_state: false
  dynamic_obstacle_state_k: 3
  ttc_horizon: 3.0
  path_block_distance: 2.5
  path_block_width: 0.75
  path_block_ttc: 2.5
  preferred_speed: 0.50
  wait_speed: 0.08

training:
  task_name: go2_dynamic_obstacles
  experiment_name: Go2_dynamic_obstacles
  algorithm: ppo
  seed: 42
  max_iterations: 5200
  num_envs: 768
  headless: true
  reset_optimizer: false

evaluation:
  experiment_name: Go2_dynamic_obstacles
  num_envs: 1
  headless: false
  total_episodes: 3

recording:
  experiment_name: Go2_dynamic_obstacles
  num_envs: 1
  headless: true
  video_length: 1800
  total_episodes: 3

outputs:
  log_dir: logs/navigation/dynamic_obstacles_stage3
  checkpoint_dir: checkpoints/navigation/dynamic_obstacles_stage3
  video_dir: outputs/videos/navigation/dynamic_obstacles_stage3
  metrics_path: outputs/metrics/navigation_dynamic_obstacles_stage3.json
