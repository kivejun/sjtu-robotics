task:
  name: navigation/dynamic_obstacles
  family: navigation
  backend: sea_nav_modified_or_isaaclab

external_repo:
  path: external/SEA-Nav-Code
  note: SEA-Nav dynamic obstacle stage 1 with explicit dynamic obstacle observations. Train from scratch because the observation dimension changes.

runtime:
  conda_env: sea_nav

environment:
  scene: dynamic_obstacles_obs_stage1
  goal_randomization: true
  enable_dynamic_obstacles: true
  num_dynamic_obstacles: 1
  obstacle_motion_modes:
    - pedestrian_like
  obstacle_radius: 0.35
  obstacle_speed: 0.25
  obstacle_collision_distance: 0.55
  obstacle_amplitude_scale: 0.45
  obstacle_amplitude_min: 0.30
  obstacle_amplitude_max: 0.90
  include_dynamic_obstacle_state: true
  dynamic_obstacle_state_k: 3
  ttc_horizon: 3.0
  path_block_distance: 2.5
  path_block_width: 0.75
  path_block_ttc: 2.5
  path_block_rise: 0.20
  path_block_fall: 0.08
  path_block_threshold: 0.45
  preferred_speed: 0.50
  wait_speed: 0.08
  ttc_safe_distance: 0.55
  blocked_timeout: 3.0

reward:
  progress: 4.0
  preferred_velocity: 1.5
  dynamic_ttc: -3.0
  dynamic_clearance: -1.5
  wait: 1.0
  detour: -0.5
  near_goal_stop: 1.5
  dynamic_collision: -60.0
  progress_blocked_scale: 0.10
  progress_near_goal_scale: 0.20
  preferred_sigma: 0.50
  ttc_min_closing_speed: 0.03
  clearance_safe_distance: 1.00
  clearance_front_margin: -0.15
  wait_max_speed: 0.12
  wait_heading_weight: 1.0
  wait_timeout_decay: 0.40
  blocked_fast_penalty: -1.0
  blocked_fast_speed_threshold: 0.20
  blocked_fast_ttc_threshold: 1.8
  blocked_fast_closing_speed_threshold: 0.05
  detour_lateral_weight: 1.0
  detour_yaw_weight: 0.5
  detour_blocked_scale: 0.05
  detour_timeout_scale: 0.30
  near_goal_distance: 0.60
  near_goal_speed: 0.03
  near_goal_max_speed: 0.10
  near_goal_max_yaw_rate: 0.35

training:
  task_name: go2_dynamic_obstacles
  experiment_name: Go2_dynamic_obstacles_obs
  algorithm: ppo
  seed: 42
  max_iterations: 6000
  num_envs: 768
  headless: true
  reset_optimizer: true

evaluation:
  experiment_name: Go2_dynamic_obstacles_obs
  num_envs: 1
  headless: false
  total_episodes: 3

recording:
  experiment_name: Go2_dynamic_obstacles_obs
  num_envs: 1
  headless: true
  video_length: 1800
  total_episodes: 3

outputs:
  log_dir: logs/navigation/dynamic_obstacles_obs_stage1
  checkpoint_dir: checkpoints/navigation/dynamic_obstacles_obs_stage1
  video_dir: outputs/videos/navigation/dynamic_obstacles_obs_stage1
  metrics_path: outputs/metrics/navigation_dynamic_obstacles_obs_stage1.json
