task:
  name: navigation/dynamic_obstacles
  family: navigation
  backend: sea_nav_modified_or_isaaclab

external_repo:
  path: external/SEA-Nav-Code
  note: >
    Transformer dynamic-obstacle stage 3. Enable collision replay so dynamic
    collision failures are sampled more often during recovery training.

runtime:
  conda_env: sea_nav

environment:
  scene: dynamic_obstacles_transformer_stage3_failure_replay
  goal_randomization: true
  enable_dynamic_obstacles: true
  num_dynamic_obstacles: 1
  obstacle_motion_modes:
    - pedestrian_like
  obstacle_radius: 0.35
  obstacle_speed: 0.40
  obstacle_collision_distance: 0.56
  obstacle_amplitude_scale: 0.75
  obstacle_amplitude_min: 0.60
  obstacle_amplitude_max: 1.35
  phase_randomization: true
  focus_near_robot: true
  focus_distance_min: 0.80
  focus_distance_max: 1.45
  focus_lateral_min: 0.16
  focus_lateral_max: 0.70
  training_interaction_scene: true
  training_interaction_robot_jitter: 0.060
  training_interaction_goal_jitter: 0.060
  training_interaction_obstacle_frac_jitter: 0.080
  training_interaction_obstacle_lateral_jitter: 0.120
  demo_interaction_scene: false
  demo_interaction_face_goal: true
  demo_terrain_level: 1
  demo_terrain_type: 0
  demo_goal_distance_min: 3.5
  demo_robot_frac_x: 0.52
  demo_robot_frac_y: 0.34
  demo_goal_frac_x: 0.52
  demo_goal_frac_y: 0.78
  demo_force_path_obstacles: true
  demo_path_obstacle_fracs:
    - 0.28
  demo_path_lateral_offsets:
    - 0.0
  include_dynamic_obstacle_state: true
  dynamic_obstacle_state_k: 3
  ttc_horizon: 3.0
  ttc_safe_distance: 0.56
  path_block_distance: 3.3
  path_block_width: 1.00
  path_block_ttc: 3.0
  preferred_speed: 0.52
  wait_speed: 0.08
  blocked_timeout: 2.2
  episode_length_s: 12.0

policy:
  transformer_dim: 48
  transformer_heads: 4
  transformer_layers: 1
  transformer_dropout: 0.0
  dynamic_token_dim: 6
  dynamic_global_dim: 2

replay:
  enable_collision_replay: true
  replay_prob: 0.25
  early_reset_prob_range:
    - 0.20
    - 0.55
  undo_steps_range:
    - 12
    - 48
  max_collision_points: 2048

reward:
  progress: 4.2
  preferred_velocity: 1.8
  dynamic_ttc: -3.2
  dynamic_clearance: -1.6
  wait: 1.0
  blocked_fast_penalty: -1.0
  detour: -0.35
  near_goal_stop: 2.0
  dynamic_collision: -120.0
  successful_avoidance: 7.0
  risk_reduction: 2.8
  free_space_action: 1.2
  unsafe_ttc: -1.2
  nav_action_smoothness: -0.25
  static_collision: -120.0
  progress_blocked_scale: 0.12
  preferred_sigma: 0.45
  clearance_safe_distance: 1.10
  wait_timeout_decay: 0.20
  detour_blocked_scale: 0.04
  avoid_high_risk_distance: 1.05
  avoid_low_risk_distance: 1.35
  avoid_high_risk_ttc: 1.30
  avoid_low_risk_ttc: 2.50
  avoid_min_static_clearance: 0.45
  free_space_safe_distance: 0.65
  unsafe_ttc_threshold: 1.00
  nav_action_smoothness_sigma: 0.50

training:
  task_name: go2_dynamic_obstacles
  experiment_name: Go2_transformer_dynamic_avoidance
  policy_class_name: TransformerActorCritic
  algorithm: ppo
  seed: 42
  max_iterations: 3000
  num_envs: 512
  headless: true
  reset_optimizer: false

evaluation:
  experiment_name: Go2_transformer_dynamic_avoidance
  num_envs: 1
  headless: false
  total_episodes: 10

recording:
  experiment_name: Go2_transformer_dynamic_avoidance
  num_envs: 1
  headless: true
  video_length: 2400
  total_episodes: 5

outputs:
  log_dir: logs/navigation/dynamic_obstacles_transformer_stage3_failure_replay
  checkpoint_dir: checkpoints/navigation/dynamic_obstacles_transformer_stage3_failure_replay
  video_dir: outputs/videos/navigation/dynamic_obstacles_transformer_stage3_failure_replay
  metrics_path: outputs/metrics/navigation_dynamic_obstacles_transformer_stage3_failure_replay.json
