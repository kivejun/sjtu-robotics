task:
  name: navigation/dynamic_obstacles
  family: navigation
  backend: sea_nav_modified_or_isaaclab

external_repo:
  path: external/SEA-Nav-Code
  note: >
    E2E dynamic avoidance stage 2. Train recovery/navigation-resume behavior:
    after avoiding dynamic risk, the robot should return to goal-directed SEA-Nav
    behavior instead of staying stuck in avoidance mode.

runtime:
  conda_env: sea_nav

environment:
  scene: dynamic_obstacles_e2e_stage2_recovery
  goal_randomization: true
  enable_dynamic_obstacles: true
  num_dynamic_obstacles: 1
  obstacle_motion_modes:
    - pedestrian_like
  obstacle_radius: 0.35
  obstacle_speed: 0.42
  obstacle_collision_distance: 0.56
  obstacle_amplitude_scale: 0.65
  obstacle_amplitude_min: 0.45
  obstacle_amplitude_max: 1.20
  phase_randomization: true
  focus_near_robot: true
  focus_distance_min: 0.90
  focus_distance_max: 1.45
  focus_lateral_min: 0.20
  focus_lateral_max: 0.70
  include_dynamic_obstacle_state: true
  dynamic_obstacle_state_k: 3
  ttc_horizon: 3.0
  ttc_safe_distance: 0.56
  path_block_distance: 2.8
  path_block_width: 0.85
  path_block_ttc: 2.8
  path_block_rise: 0.20
  path_block_fall: 0.08
  path_block_threshold: 0.45
  preferred_speed: 0.52
  wait_speed: 0.08
  blocked_timeout: 2.4
  episode_length_s: 12.0

reward:
  progress: 4.2
  preferred_velocity: 1.8
  dynamic_ttc: -4.0
  dynamic_clearance: -2.0
  wait: 1.2
  blocked_fast_penalty: -1.2
  detour: -0.45
  near_goal_stop: 2.0
  dynamic_collision: -100.0
  successful_avoidance: 6.0
  risk_reduction: 2.5
  free_space_action: 1.0
  unsafe_ttc: -1.0
  nav_action_smoothness: -0.25
  static_collision: -100.0
  progress_blocked_scale: 0.12
  progress_near_goal_scale: 0.18
  preferred_sigma: 0.45
  ttc_min_closing_speed: 0.03
  clearance_safe_distance: 1.10
  clearance_front_margin: -0.15
  wait_max_speed: 0.12
  wait_heading_weight: 1.0
  wait_timeout_decay: 0.20
  blocked_fast_speed_threshold: 0.18
  blocked_fast_ttc_threshold: 2.0
  blocked_fast_closing_speed_threshold: 0.05
  detour_lateral_weight: 1.0
  detour_yaw_weight: 0.5
  detour_blocked_scale: 0.04
  detour_timeout_scale: 0.22
  near_goal_distance: 0.60
  near_goal_speed: 0.03
  near_goal_max_speed: 0.10
  near_goal_max_yaw_rate: 0.35
  avoid_high_risk_distance: 1.05
  avoid_low_risk_distance: 1.35
  avoid_high_risk_ttc: 1.30
  avoid_low_risk_ttc: 2.50
  avoid_min_static_clearance: 0.45
  risk_reduction_distance_weight: 0.55
  risk_reduction_ttc_weight: 0.45
  free_space_safe_distance: 0.65
  free_space_speed_threshold: 0.08
  unsafe_ttc_threshold: 1.00
  nav_action_smoothness_sigma: 0.50

training:
  task_name: go2_dynamic_obstacles
  experiment_name: Go2_e2e_dynamic_avoidance
  algorithm: ppo
  seed: 42
  max_iterations: 3000
  num_envs: 768
  headless: true
  reset_optimizer: false

evaluation:
  experiment_name: Go2_e2e_dynamic_avoidance
  num_envs: 1
  headless: false
  total_episodes: 10

recording:
  experiment_name: Go2_e2e_dynamic_avoidance
  num_envs: 1
  headless: true
  video_length: 2400
  total_episodes: 5

outputs:
  log_dir: logs/navigation/dynamic_obstacles_e2e_stage2_recovery
  checkpoint_dir: checkpoints/navigation/dynamic_obstacles_e2e_stage2_recovery
  video_dir: outputs/videos/navigation/dynamic_obstacles_e2e_stage2_recovery
  metrics_path: outputs/metrics/navigation_dynamic_obstacles_e2e_stage2_recovery.json

