task:
  name: navigation/dynamic_obstacles
  family: navigation
  backend: sea_nav_modified_or_isaaclab

runtime:
  conda_env: sea_nav

environment:
  scene: dynamic_obstacles_transformer_stage4d_mild_adversarial
  goal_randomization: true
  enable_dynamic_obstacles: true
  num_dynamic_obstacles: 3
  obstacle_motion_modes:
    - pedestrian_like
    - back_and_forth
    - random_rigid_body
  obstacle_radius: 0.35
  obstacle_speed: 0.46
  obstacle_collision_distance: 0.56
  obstacle_amplitude_scale: 0.85
  obstacle_amplitude_min: 0.65
  obstacle_amplitude_max: 1.55
  phase_randomization: true
  focus_near_robot: true
  focus_distance_min: 0.80
  focus_distance_max: 1.55
  focus_lateral_min: 0.10
  focus_lateral_max: 0.80
  demo_force_path_obstacles: true
  demo_path_obstacle_fracs:
    - 0.28
    - 0.52
    - 0.76
  demo_path_lateral_offsets:
    - 0.0
    - 0.18
    - -0.18
  include_dynamic_obstacle_state: true
  dynamic_obstacle_state_k: 3
  ttc_horizon: 3.0
  ttc_safe_distance: 0.56
  path_block_distance: 3.2
  path_block_width: 1.00
  path_block_ttc: 3.0
  preferred_speed: 0.52
  wait_speed: 0.08
  blocked_timeout: 2.0
  episode_length_s: 18.0

policy:
  transformer_dim: 48
  transformer_heads: 4
  transformer_layers: 1
  transformer_dropout: 0.0
  dynamic_token_dim: 6
  dynamic_global_dim: 2

replay:
  enable_collision_replay: true
  replay_prob: 0.35

reward:
  progress: 4.5
  preferred_velocity: 1.8
  dynamic_ttc: -3.6
  dynamic_clearance: -1.8
  wait: 0.8
  blocked_fast_penalty: -1.2
  detour: -0.25
  near_goal_stop: 2.0
  dynamic_collision: -150.0
  successful_avoidance: 7.0
  risk_reduction: 2.4
  free_space_action: 1.0
  unsafe_ttc: -1.2
  nav_action_smoothness: -0.25
  static_collision: -150.0
  avoid_high_risk_distance: 1.05
  avoid_low_risk_distance: 1.35
  avoid_high_risk_ttc: 1.30
  avoid_low_risk_ttc: 2.50
  avoid_min_static_clearance: 0.45

training:
  task_name: go2_dynamic_obstacles
  experiment_name: Go2_transformer_dynamic_avoidance
  policy_class_name: TransformerActorCritic
  algorithm: ppo
  seed: 42
  max_iterations: 4000
  num_envs: 512
  headless: true
  reset_optimizer: false

outputs:
  log_dir: logs/navigation/dynamic_obstacles_transformer_stage4d_mild_adversarial
  checkpoint_dir: checkpoints/navigation/dynamic_obstacles_transformer_stage4d_mild_adversarial
  video_dir: outputs/videos/navigation/dynamic_obstacles_transformer_stage4d_mild_adversarial
  metrics_path: outputs/metrics/navigation_dynamic_obstacles_transformer_stage4d_mild_adversarial.json
