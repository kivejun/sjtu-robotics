task:
  name: navigation/sea_nav_baseline
  family: navigation
  backend: sea_nav

external_repo:
  path: external/SEA-Nav-Code
  note: Official SEA-Nav-Code repository cloned under external/.

runtime:
  conda_env: sea_nav

environment:
  scene: baseline
  goal_randomization: true
  obstacle_mode: static

robot:
  type: wheeled_or_legged

sensor:
  depth: false
  lidar: true

training:
  task_name: go2_pos_rough
  experiment_name: Go2_pos_rough
  algorithm: ppo
  seed: 42
  max_iterations: 4000
  num_envs: 1024
  headless: true

evaluation:
  num_envs: 1
  headless: false
  total_episodes: 10

recording:
  num_envs: 1
  headless: true
  video_length: 3000
  total_episodes: 5

outputs:
  log_dir: logs/navigation/sea_nav_baseline
  checkpoint_dir: checkpoints/navigation/sea_nav_baseline
  video_dir: outputs/videos/navigation/sea_nav_baseline
  metrics_path: outputs/metrics/navigation_sea_nav_baseline.json
